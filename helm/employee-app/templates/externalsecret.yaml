# ExternalSecret fetches credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    # Map each key from the Secrets Manager JSON to a K8s secret key
    - secretKey: DB_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: db_host
    - secretKey: DB_PORT
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: db_port
    - secretKey: DB_NAME
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: db_name
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: db_username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: db_password
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.secretName }}
        property: database_url
