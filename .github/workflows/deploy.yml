name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 075120018043.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: landmark-cluster-dev
  NAMESPACE: employee-app
  HELM_RELEASE: employee-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/employee-backend:${{ steps.tag.outputs.tag }} employee-app/backend/
          docker push ${{ env.ECR_REGISTRY }}/employee-backend:${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/employee-frontend:${{ steps.tag.outputs.tag }} employee-app/frontend/
          docker push ${{ env.ECR_REGISTRY }}/employee-frontend:${{ steps.tag.outputs.tag }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask flask-cors flask-sqlalchemy boto3 watchtower pytest pytest-flask moto

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          S3_BUCKET: test-bucket
          AWS_REGION: us-east-1
        run: |
          cd employee-app/backend
          pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Update image tag in values.yaml
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s/tag: .*/tag: $TAG/" helm/values.yaml

      - name: Commit updated tag back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/values.yaml
          git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image_tag }}" || true
          git push

      - name: Install/Upgrade Helm release
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
